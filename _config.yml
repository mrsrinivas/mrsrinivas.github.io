theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Singapore

title: Srinivas Reddy Alluri
tagline: Cloud Data/AI Engineering Lead
description: Writing about data engineering, distributed systems, streaming pipelines, and machine learning at scale.

url: "https://mrsrinivas.github.io"
baseurl: ""

github:
  username: mrsrinivas

twitter:
  username: _mrsrinivas

social:
  name: Srinivas Reddy Alluri
  email: heysrini@outlook.com
  links:
    - https://github.com/mrsrinivas
    - https://www.linkedin.com/in/mrsrinivas

avatar: /assets/img/avatar.png
since: 2014

theme_mode: # leave blank for auto (light/dark follows OS)

toc: true

paginate: 10

analytics:
  goatcounter:
    id: sreddya

pageviews:
  provider: goatcounter

comments:
  provider: giscus
  giscus:
    repo: mrsrinivas/mrsrinivas.github.io
    repo_id: MDEwOlJlcG9zaXRvcnkzNzI0MzA4OA==
    category: General
    category_id: DIC_kwDOAjhI0M4C5iMa
    mapping: url
    strict: 1
    reactions_enabled: 1
    input_position: bottom

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true

permalink: /posts/:title/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
      toc: true

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gruntfile.js
  - less/
  - mail/
  - dist/
  - src-index.html
  - vendor
  - .bundle
