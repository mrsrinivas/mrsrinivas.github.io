theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Singapore

title: Srinivas Reddy Alluri
tagline: Cloud Data/ML Engineering Lead
description: Writing about data engineering, distributed systems, streaming pipelines, and machine learning at scale.

url: "https://mrsrinivas.github.io"
baseurl: ""

github:
  username: mrsrinivas

twitter:
  username: _mrsrinivas

social:
  name: Srinivas Reddy Alluri
  email: heysrini@outlook.com
  links:
    - https://github.com/mrsrinivas
    - https://www.linkedin.com/in/mrsrinivas

avatar: /assets/img/avatar.jpg
since: 2014

theme_mode: # leave blank for auto (light/dark follows OS)

toc: true

paginate: 10

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true

permalink: /posts/:title/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
      toc: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gruntfile.js
  - less/
  - mail/
  - dist/
  - src-index.html
  - vendor
  - .bundle
