<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="sans-serif">
  <!-- Background -->
  <rect width="680" height="300" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Round-Robin Routing — No Key, No Explicit Partition</text>

  <!-- Producer Records (no key) -->
  <rect x="30" y="55"  width="150" height="44" rx="6" fill="#888" stroke="#555" stroke-width="1.5"/>
  <text x="105" y="73"  text-anchor="middle" font-size="11" fill="white" font-weight="bold">ProducerRecord</text>
  <text x="105" y="90"  text-anchor="middle" font-size="11" fill="#ddd">key = null  →  P0</text>

  <rect x="30" y="115" width="150" height="44" rx="6" fill="#888" stroke="#555" stroke-width="1.5"/>
  <text x="105" y="133" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ProducerRecord</text>
  <text x="105" y="150" text-anchor="middle" font-size="11" fill="#ddd">key = null  →  P1</text>

  <rect x="30" y="175" width="150" height="44" rx="6" fill="#888" stroke="#555" stroke-width="1.5"/>
  <text x="105" y="193" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ProducerRecord</text>
  <text x="105" y="210" text-anchor="middle" font-size="11" fill="#ddd">key = null  →  P2</text>

  <rect x="30" y="235" width="150" height="44" rx="6" fill="#888" stroke="#555" stroke-width="1.5"/>
  <text x="105" y="253" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ProducerRecord</text>
  <text x="105" y="270" text-anchor="middle" font-size="11" fill="#ddd">key = null  →  P0</text>

  <!-- Round-robin label -->
  <rect x="255" y="138" width="130" height="44" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="1.5"/>
  <text x="320" y="156" text-anchor="middle" font-size="12" fill="#ecf0f1" font-weight="bold">Round-Robin</text>
  <text x="320" y="174" text-anchor="middle" font-size="11" fill="#95a5a6">cycles P0→P1→P2…</text>

  <!-- Arrows: records → round-robin -->
  <line x1="180" y1="77"  x2="255" y2="148" stroke="#888" stroke-width="1.8" marker-end="url(#arr-gray)"/>
  <line x1="180" y1="137" x2="255" y2="155" stroke="#888" stroke-width="1.8" marker-end="url(#arr-gray)"/>
  <line x1="180" y1="197" x2="255" y2="165" stroke="#888" stroke-width="1.8" marker-end="url(#arr-gray)"/>
  <line x1="180" y1="257" x2="255" y2="172" stroke="#888" stroke-width="1.8" marker-end="url(#arr-gray)"/>

  <!-- Partitions -->
  <rect x="460" y="55"  width="170" height="44" rx="6" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="545" y="73"  text-anchor="middle" font-size="12" fill="white" font-weight="bold">Partition 0</text>
  <text x="545" y="90"  text-anchor="middle" font-size="11" fill="#a9dfbf">msg 1, msg 4, …</text>

  <rect x="460" y="127" width="170" height="44" rx="6" fill="#e67e22" stroke="#b85c00" stroke-width="1.5"/>
  <text x="545" y="145" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Partition 1</text>
  <text x="545" y="162" text-anchor="middle" font-size="11" fill="#fde3c8">msg 2, msg 5, …</text>

  <rect x="460" y="199" width="170" height="44" rx="6" fill="#8e44ad" stroke="#6c3483" stroke-width="1.5"/>
  <text x="545" y="217" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Partition 2</text>
  <text x="545" y="234" text-anchor="middle" font-size="11" fill="#d7bde2">msg 3, msg 6, …</text>

  <!-- Arrows: round-robin → partitions -->
  <line x1="385" y1="148" x2="460" y2="77"  stroke="#27ae60" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <line x1="385" y1="158" x2="460" y2="149" stroke="#e67e22" stroke-width="1.8" marker-end="url(#arr-orange)"/>
  <line x1="385" y1="168" x2="460" y2="221" stroke="#8e44ad" stroke-width="1.8" marker-end="url(#arr-purple)"/>

  <!-- Note -->
  <text x="340" y="284" text-anchor="middle" font-size="11" fill="#555">No ordering guarantee across partitions. Good for maximum throughput.</text>

  <defs>
    <marker id="arr-gray"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker>
    <marker id="arr-green"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/></marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#8e44ad"/></marker>
  </defs>
</svg>
