<svg width="700" height="360" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="360" fill="#f8f9fa"/>

  <!-- Physical Node boundary -->
  <rect x="20" y="20" width="660" height="310" rx="8" fill="none" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="350" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7f8c8d">Physical / Virtual Machine</text>

  <!-- Worker Process -->
  <rect x="40" y="52" width="620" height="258" rx="8" fill="none" stroke="#1a6b3a" stroke-width="2"/>
  <rect x="40" y="52" width="620" height="32" rx="8" fill="#1a6b3a"/>
  <text x="350" y="73" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Worker Process  (1 per node — manages resources, spawns executors)</text>

  <!-- Executor 1 -->
  <rect x="60" y="98" width="175" height="196" rx="6" fill="#2980b9"/>
  <text x="147" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Executor 1</text>
  <text x="147" y="136" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aed6f1">(JVM process)</text>
  <line x1="70" y1="144" x2="225" y2="144" stroke="#2471a3" stroke-width="1"/>
  <rect x="72" y="152" width="151" height="28" rx="4" fill="#f39c12"/>
  <text x="147" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2c3e50">Task slot (running)</text>
  <rect x="72" y="188" width="151" height="28" rx="4" fill="#f39c12"/>
  <text x="147" y="206" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2c3e50">Task slot (running)</text>
  <rect x="72" y="224" width="151" height="28" rx="4" fill="#7f8c8d"/>
  <text x="147" y="242" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">Task slot (idle)</text>
  <text x="147" y="274" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aed6f1">Heap: 4 GB</text>
  <text x="147" y="288" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aed6f1">Cores: 3</text>

  <!-- Executor 2 -->
  <rect x="262" y="98" width="175" height="196" rx="6" fill="#2980b9"/>
  <text x="349" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Executor 2</text>
  <text x="349" y="136" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aed6f1">(JVM process)</text>
  <line x1="272" y1="144" x2="427" y2="144" stroke="#2471a3" stroke-width="1"/>
  <rect x="274" y="152" width="151" height="28" rx="4" fill="#f39c12"/>
  <text x="349" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2c3e50">Task slot (running)</text>
  <rect x="274" y="188" width="151" height="28" rx="4" fill="#7f8c8d"/>
  <text x="349" y="206" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">Task slot (idle)</text>
  <rect x="274" y="224" width="151" height="28" rx="4" fill="#7f8c8d"/>
  <text x="349" y="242" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">Task slot (idle)</text>
  <text x="349" y="274" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aed6f1">Heap: 4 GB</text>
  <text x="349" y="288" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aed6f1">Cores: 3</text>

  <!-- Executor 3 -->
  <rect x="464" y="98" width="175" height="196" rx="6" fill="#34495e"/>
  <text x="551" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Executor 3</text>
  <text x="551" y="136" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#bdc3c7">(not started yet)</text>
  <line x1="474" y1="144" x2="629" y2="144" stroke="#2c3e50" stroke-width="1"/>
  <text x="551" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#95a5a6">spawned when</text>
  <text x="551" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#95a5a6">workload demands</text>
  <text x="551" y="236" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#95a5a6">and resources allow</text>
  <text x="551" y="274" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#7f8c8d">CPU / Memory</text>
  <text x="551" y="288" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#7f8c8d">available</text>

  <!-- Caption -->
  <text x="350" y="346" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7f8c8d">Number of executors per worker depends on available CPU cores, memory, and current cluster workload</text>
</svg>
